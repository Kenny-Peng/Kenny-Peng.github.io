layout: page
title: Writing Samples
permalink: /writing-samples/
---

<div class="posts">
  <p>Here are some samples of some of the things that I have written.</p>

  {% for post in site.posts %}
    <article class="post">
      <h2><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h2>

      <div class="entry">
        {{ post.content }}
      </div>

      <a href="{{ site.baseurl }}{{ post.url }}" class="read-more">Show on Another Page</a>
    </article>
  {% endfor %}
</div>
